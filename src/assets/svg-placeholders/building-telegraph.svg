<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 65 76" fill="none">
  <!-- Main body -->
  <rect x="0" y="0" width="65" height="76" stroke="#c9a96e" stroke-width="1.5" fill="#1a0d04"/>
  <!-- Roof line detail -->
  <rect x="0" y="0" width="65" height="8" fill="#2a1a0a" stroke="#c9a96e" stroke-width="1"/>
  <!-- Antenna/telegraph pole on roof -->
  <line x1="32" y1="0" x2="32" y2="-14" stroke="#c9a96e" stroke-width="1.5"/>
  <line x1="22" y1="-10" x2="42" y2="-10" stroke="#c9a96e" stroke-width="1"/>
  <line x1="24" y1="-5" x2="40" y2="-5" stroke="#c9a96e" stroke-width="1"/>
  <!-- Insulators -->
  <circle cx="22" cy="-10" r="2" fill="#c9a96e"/>
  <circle cx="42" cy="-10" r="2" fill="#c9a96e"/>
  <!-- Window row 1 -->
  <rect x="8" y="18" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="37" y="18" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Window row 2 -->
  <rect x="8" y="40" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="37" y="40" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Door -->
  <rect x="22" y="58" width="21" height="18" rx="2" fill="#1a1207" stroke="#c9a96e" stroke-width="1"/>
</svg>
