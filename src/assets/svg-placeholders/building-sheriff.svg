<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 95" fill="none">
  <!-- Flat roof parapet -->
  <rect x="0" y="0" width="80" height="8" fill="#1a0d04" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Main body -->
  <rect x="0" y="8" width="80" height="87" stroke="#c9a96e" stroke-width="1.5" fill="#1a0d04"/>
  <!-- Hanging sign bar -->
  <rect x="8" y="4" width="64" height="6" rx="1" fill="#2a1a0a"/>
  <!-- Star badge above door -->
  <circle cx="40" cy="25" r="5" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
  <line x1="40" y1="19" x2="40" y2="31" stroke="#c9a96e" stroke-width="1"/>
  <line x1="34" y1="25" x2="46" y2="25" stroke="#c9a96e" stroke-width="1"/>
  <!-- Window row 1 -->
  <rect x="8" y="34" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="45" y="34" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Window row 2 -->
  <rect x="8" y="60" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="45" y="60" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Door -->
  <rect x="27" y="77" width="26" height="18" rx="2" fill="#1a1207" stroke="#c9a96e" stroke-width="1"/>
</svg>
