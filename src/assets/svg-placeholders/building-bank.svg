<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!-- Stepped parapet top (3 levels) -->
  <rect x="10" y="0" width="60" height="6" fill="#1a0d04" stroke="#c9a96e" stroke-width="1.5"/>
  <rect x="0" y="6" width="80" height="6" fill="#1a0d04" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Main body -->
  <rect x="0" y="12" width="80" height="88" stroke="#c9a96e" stroke-width="1.5" fill="#1a0d04"/>
  <!-- Hanging sign bar -->
  <rect x="8" y="8" width="64" height="6" rx="1" fill="#2a1a0a"/>
  <!-- Columns (decorative verticals) -->
  <line x1="16" y1="12" x2="16" y2="76" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="12" x2="64" y2="76" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <!-- Window row 1 -->
  <rect x="8" y="24" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="45" y="24" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Window row 2 -->
  <rect x="8" y="50" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="45" y="50" width="27" height="20" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Vault door (wide arch door) -->
  <rect x="24" y="76" width="32" height="24" rx="3" fill="#1a1207" stroke="#c9a96e" stroke-width="1.5"/>
  <circle cx="40" cy="88" r="5" stroke="#c9a96e" stroke-width="1" fill="none"/>
</svg>
