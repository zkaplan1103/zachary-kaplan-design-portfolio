<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" fill="none">
  <!-- Wagon body -->
  <rect x="20" y="8" width="38" height="16" rx="2" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Wagon cover arc -->
  <path d="M20 8 Q39 1 58 8" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Axles -->
  <line x1="26" y1="24" x2="26" y2="28" stroke="#c9a96e" stroke-width="1.5"/>
  <line x1="52" y1="24" x2="52" y2="28" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Wheels -->
  <circle cx="26" cy="28" r="4" stroke="#c9a96e" stroke-width="1.5"/>
  <circle cx="52" cy="28" r="4" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Wheel spokes -->
  <line x1="26" y1="24" x2="26" y2="32" stroke="#c9a96e" stroke-width="1"/>
  <line x1="22" y1="28" x2="30" y2="28" stroke="#c9a96e" stroke-width="1"/>
  <line x1="52" y1="24" x2="52" y2="32" stroke="#c9a96e" stroke-width="1"/>
  <line x1="48" y1="28" x2="56" y2="28" stroke="#c9a96e" stroke-width="1"/>
  <!-- Tongue/shaft -->
  <line x1="20" y1="22" x2="8" y2="20" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Horse body -->
  <ellipse cx="6" cy="19" rx="6" ry="4" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Horse head -->
  <circle cx="1" cy="16" r="3" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Horse legs -->
  <line x1="4" y1="23" x2="3" y2="30" stroke="#c9a96e" stroke-width="1.5"/>
  <line x1="7" y1="23" x2="8" y2="30" stroke="#c9a96e" stroke-width="1.5"/>
</svg>
