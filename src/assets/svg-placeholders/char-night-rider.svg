<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Horse body — gallop -->
  <ellipse cx="22" cy="24" rx="12" ry="7" stroke="#ff6060" stroke-width="1.5"/>
  <!-- Horse head -->
  <circle cx="12" cy="19" r="4" stroke="#ff6060" stroke-width="1.5"/>
  <!-- Neck -->
  <line x1="15" y1="21" x2="18" y2="24" stroke="#ff6060" stroke-width="1.5"/>
  <!-- Legs — extended gallop -->
  <line x1="17" y1="31" x2="13" y2="40" stroke="#ff6060" stroke-width="1.5"/>
  <line x1="21" y1="31" x2="24" y2="40" stroke="#ff6060" stroke-width="1.5"/>
  <line x1="25" y1="31" x2="21" y2="40" stroke="#ff6060" stroke-width="1.5"/>
  <line x1="29" y1="31" x2="33" y2="38" stroke="#ff6060" stroke-width="1.5"/>
  <!-- Tail -->
  <path d="M34 22 Q40 18 38 14" stroke="#ff6060" stroke-width="1.5"/>
  <!-- Rider body -->
  <circle cx="20" cy="16" r="3" stroke="#ff6060" stroke-width="1.5"/>
  <line x1="20" y1="19" x2="20" y2="24" stroke="#ff6060" stroke-width="1.5"/>
  <!-- Rider hat -->
  <line x1="16" y1="13" x2="24" y2="13" stroke="#ff6060" stroke-width="1.5"/>
  <rect x="17" y="9" width="6" height="4" rx="1" stroke="#ff6060" stroke-width="1.5"/>
</svg>
