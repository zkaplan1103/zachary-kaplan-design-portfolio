<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 36" fill="none">
  <!-- Hat brim (wide outlaw) -->
  <line x1="1" y1="6" x2="19" y2="6" stroke="#80c0ff" stroke-width="1.5"/>
  <!-- Hat crown -->
  <rect x="4" y="2" width="12" height="4" rx="1" stroke="#80c0ff" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="10" cy="11" r="4" stroke="#80c0ff" stroke-width="1.5"/>
  <!-- Mask line -->
  <line x1="6" y1="11" x2="14" y2="11" stroke="#80c0ff" stroke-width="1"/>
  <!-- Body — hunched -->
  <line x1="10" y1="15" x2="9" y2="26" stroke="#80c0ff" stroke-width="2"/>
  <!-- Arm with money bag -->
  <line x1="9" y1="18" x2="2" y2="16" stroke="#80c0ff" stroke-width="1.5"/>
  <circle cx="1" cy="16" r="3" stroke="#80c0ff" stroke-width="1.5"/>
  <!-- Other arm -->
  <line x1="9" y1="18" x2="16" y2="22" stroke="#80c0ff" stroke-width="1.5"/>
  <!-- Legs — running -->
  <line x1="9" y1="26" x2="4" y2="35" stroke="#80c0ff" stroke-width="1.5"/>
  <line x1="9" y1="26" x2="13" y2="33" stroke="#80c0ff" stroke-width="1.5"/>
</svg>
