<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 65 72" fill="none">
  <!-- Flat roof -->
  <rect x="0" y="0" width="65" height="72" stroke="#c9a96e" stroke-width="1.5" fill="#1a0d04"/>
  <!-- Porch overhang -->
  <rect x="0" y="0" width="65" height="10" fill="#2a1a0a" stroke="#c9a96e" stroke-width="1"/>
  <!-- Porch post left -->
  <line x1="8" y1="10" x2="8" y2="55" stroke="#c9a96e" stroke-width="1" opacity="0.6"/>
  <!-- Porch post right -->
  <line x1="57" y1="10" x2="57" y2="55" stroke="#c9a96e" stroke-width="1" opacity="0.6"/>
  <!-- Window row -->
  <rect x="8" y="18" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="37" y="18" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Window row 2 -->
  <rect x="8" y="40" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <rect x="37" y="40" width="20" height="16" rx="1" fill="#ff8c00" stroke="#c9a96e" stroke-width="1"/>
  <!-- Door -->
  <rect x="22" y="55" width="21" height="17" rx="2" fill="#1a1207" stroke="#c9a96e" stroke-width="1"/>
</svg>
